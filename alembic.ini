# Alembic config for CostPilot
# NOTE: SQLAlchemy URL is NOT set in this file;
# it is dynamically generated by packages/db-migrations/env.py at runtime,
# based on whether we are in dev mode or PyInstaller-packaged mode.
[alembic]
script_location = packages/db-migrations
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
