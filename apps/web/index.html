<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>造价通 CostPilot</title>
  <style>
    /* 加载中提示 - Vue 挂载后自动消失 */
    #app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #909399;
      font-size: 14px;
    }
    #app-loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e8e8e8;
      border-top-color: #409eff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div id="app-loading">
      <div class="spinner"></div>
      <div>造价通加载中...</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
