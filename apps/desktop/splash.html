<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>造价通 CostPilot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #1a2332;
      color: #e8eaed;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .splash { text-align: center; }
    .logo-icon {
      width: 64px; height: 64px; background: #409eff; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 32px; color: #fff; font-weight: bold;
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    .sub { color: #9aa0a6; font-size: 14px; margin-bottom: 32px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(64,158,255,0.2);
      border-top: 3px solid #409eff;
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { margin-top: 16px; font-size: 13px; color: #9aa0a6; }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo-icon">C</div>
    <h1>造价通</h1>
    <div class="sub">CostPilot · 建设工程造价平台</div>
    <div class="spinner"></div>
    <div class="status">正在启动服务...</div>
  </div>
  <!-- 纯展示页面，导航由 Electron 主进程控制，避免竞争跳转 -->
</body>
</html>
