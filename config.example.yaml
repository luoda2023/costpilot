# ====================================================================================
# 造价通 CostPilot - 用户配置文件
# ====================================================================================
# 说明:
#   ① 本文件为唯一对外配置入口,改完保存重启后端即可生效
#   ② 选择 ai.provider 中的内置别名(已预置 5 大主流 API + 本地 Ollama)
#      或 ai.provider: "custom" 走 OpenAI 兼容格式自填 base_url / api_key / model
#   ③ 本文件**不提交到 git**,生产部署请加入 .gitignore
# ====================================================================================

ai:
  # ============= 内嵌 AI 聊天 UI (开源项目 LobeChat) =============
  # 造价通的「AI 助手」标签页直接 iframe 嵌入下方地址,无需自己写聊天 UI
  # 推荐: Docker 一键起 → http://localhost:3210
  # 留空则用默认 localhost:3210
  lobechat_url: "http://localhost:3210"

  # ============= AI 服务商选择 =============
  # 内置可选:
  #   deepseek   -> DeepSeek 官方 API (推荐,中文工程领域表现优秀)
  #   qwen       -> 阿里通义千问在线 API (DashScope OpenAI 兼容)
  #   zhipu      -> 智谱 GLM-4 系列
  #   moonshot   -> 月之暗面 KIMI
  #   openai     -> OpenAI 官方 (GPT-4o / GPT-4o-mini)
  #   ollama     -> 本地 Ollama (默认 http://127.0.0.1:11434,无需密钥,可选模型 qwen2.5:7b-instruct)
  #   custom     -> 自填 base_url(必须 OpenAI 兼容 /v1/chat/completions 接口)
  provider: "deepseek"

  # ============= 通用字段(被内置 alias 自动填充,也可显式覆盖) =============
  # 显式填写优先级最高,留空则用内置默认值
  base_url: ""        # 例: https://api.deepseek.com/v1
  api_key: ""  # 用户启动后在系统设置页填,或编辑此文件
  model: ""            # 例: deepseek-chat

  # ============= 通用调用参数 =============
  temperature: 0.3     # 0=精确 1=发散 造价领域建议 0.3
  max_tokens: 4096     # 单次响应最大 tokens
  timeout: 120         # HTTP 超时(秒)

  # ============= 内置 Provider 默认值(供参考,需填 api_key 才能用) =============
  presets:
    deepseek:
      base_url: "https://api.deepseek.com/v1"
      model: "deepseek-chat"
      note: "在 https://platform.deepseek.com 申请 api_key"
    qwen:
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      model: "qwen-plus"
      note: "阿里云 DashScope,在 https://dashscope.console.aliyun.com 申请"
    zhipu:
      base_url: "https://open.bigmodel.cn/api/paas/v4"
      model: "glm-4-plus"
      note: "智谱开放平台,在 https://open.bigmodel.cn 申请"
    moonshot:
      base_url: "https://api.moonshot.cn/v1"
      model: "moonshot-v1-32k"
      note: "月之暗面,在 https://platform.moonshot.cn 申请"
    openai:
      base_url: "https://api.openai.com/v1"
      model: "gpt-4o-mini"
      note: "OpenAI 官方,需海外网络"
    ollama:
      base_url: "http://127.0.0.1:11434/v1"
      model: "qwen2.5:7b-instruct"
      note: "本地 Ollama,无需 api_key,需先 ollama pull <model>"


# ====================================================================================
# RAG 知识库配置
# ====================================================================================
rag:
  # 向量化模型 - bge-m3 中英双语,本地运行,无需 API
  embedding_model: "BAAI/bge-m3"
  embedding_dim: 1024

  # 向量库 - ChromaDB 本地持久化
  chroma_dir: "data/chroma"

  # 分块策略
  chunk_size: 800       # 每块 800 字符
  chunk_overlap: 100    # 块间重叠 100 字符
  chunk_min_size: 50    # 小于此长度的块合并

  # 检索参数
  top_k: 5              # 召回 TOP 5
  score_threshold: 0.5  # 相似度阈值


# ====================================================================================
# 资料库根路径(向量化时扫描)
# ====================================================================================
knowledge_sources:
  - path: "H:/AI-model/价格信息库"
    description: "17,864 条综合单价 + 370 专题 + 16 费率"
    file_types: ["md", "xlsx", "pdf"]
  - path: "H:/AI-model/文本编制模板库"
    description: "8 类文本格式谱"
    file_types: ["md"]
  - path: "H:/AI-model/查询存档"
    description: "操作手册与复核报告"
    file_types: ["md"]
  - path: "H:/AI-model/我的资源"
    description: "21,000+ 原文件:规范/图集/合同/方案/结算书"
    file_types: ["pdf", "docx", "xlsx", "md"]
    skip_dirs: ["临时", "temp", "~$"]   # 跳过这些目录


# ====================================================================================
# 数据库
# ====================================================================================
database:
  # SQLite(默认,桌面单机)
  url: "sqlite:///data/sqlite/造价通.db"
  # PostgreSQL(M5 Web 升级时启用)
  # url: "postgresql+psycopg2://user:pass@localhost:5432/costpilot"


# ====================================================================================
# 服务监听
# ====================================================================================
server:
  host: "127.0.0.1"
  port: 8765
